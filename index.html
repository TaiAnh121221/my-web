<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uchiha System - Modern</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="overlay"></div>

    <div id="auth-section">
        <div class="container">
            <div class="card">
                <h2 id="form-title">ĐĂNG KÝ TÀI KHOẢN</h2>
                <div class="input-group">
                    <input type="email" id="user-email" placeholder="Email của bạn..." required>
                </div>
                <div class="input-group">
                    <input type="password" id="user-pass" placeholder="Mật khẩu..." required>
                </div>
                <div class="input-group" id="re-pass-group">
                    <input type="password" id="user-re-pass" placeholder="Nhập lại mật khẩu...">
                </div>
                <p id="status-text">Khởi tạo sức mạnh Uchiha</p>
                <button id="btn-main">XÁC NHẬN ĐĂNG KÝ</button>
                <p class="switch-p">
                    Bạn đã có tài khoản? <span id="switch-mode">Đăng nhập ngay</span>
                </p>
            </div>
        </div>
    </div>

    <div id="gallery-section" style="display: none;">
        <div class="container">
            <div class="card gallery-card">
                <h2>KHO LƯU TRỮ UCHIHA</h2>
                <div class="image-grid">
                    <div class="img-item">
                        <img src="itachi.jpg" alt="Itachi">
                        <p>Itachi Uchiha</p>
                    </div>
                    <div class="img-item">
                        <img src="obito.jpg" alt="Obito">
                        <p>Obito Uchiha</p>
                    </div>
                    <div class="img-item">
                        <img src="pain.jpg" alt="Pain">
                        <p>Pain (Nagato)</p>
                    </div>
                </div>
                <button class="logout-btn" onclick="location.reload()">ĐĂNG XUẤT</button>
            </div>
        </div>
    </div>

    <audio id="bg-music" loop>
        <source src="trung.mp3" type="audio/mpeg">
    </audio>

    <script src="script.js"></script>
</body>
</html>
