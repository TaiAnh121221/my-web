<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Uchiha Gallery - Thư viện ảnh</title>
    <link rel="stylesheet" href="style.css">
</head><meta name="viewport" content="width=device-width, initial-scale=1.0">
<body>
    <div class="overlay"></div>
    <div class="container">
        <div class="card gallery-card">
            <h2>KHO LƯU TRỮ UCHIHA</h2>
            <p>Chọn ảnh để xử lý hoặc tải lên hệ thống</p>
            
            <div class="upload-section">
                <input type="file" id="file-input" hidden>
                <label for="file-input" class="upload-btn">CHỌN ẢNH TỪ MÁY</label>
            </div>
<div class="image-grid">
    <div class="img-item">
        <div class="img-box">
            <img src="itachi.jpg" alt="Itachi">
        </div>
        <p>Itachi Uchiha</p>
    </div>

    <div class="img-item">
        <div class="img-box">
            <img src="pain.jpg" alt="Pain">
        </div>
        <p>Pain Deva</p>
    </div>

    <div class="img-item">
        <div class="img-box">
            <img src="obito.jpg" alt="Obito">
        </div>
        <p>Obito Uchiha</p>
    </div>
</div>
            <button onclick="window.location.href='index.html'">QUAY LẠI TRANG CHỦ</button>
        </div>
    </div>
</body>
</html>
